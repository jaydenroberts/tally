name: test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Least privilege: nothing by default, granted per-job.
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  backend-tests:
    name: backend-tests
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python 3.11 (matches the runtime image)
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install pinned backend dependencies
        run: |
          set -euo pipefail
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Run pytest (temp SQLite, ephemeral secret)
        run: |
          set -euo pipefail
          # Ephemeral CI-only values: the app fails closed without a >=32-char
          # SECRET_KEY, and its default DB path only exists inside the container.
          export SECRET_KEY="$(openssl rand -hex 32)"
          export DATABASE_URL="sqlite:///${RUNNER_TEMP}/tally-test.db"
          # 'thread_race' tests are quarantined in CI (flaky under parallel
          # load — see the marker registration in tests/conftest.py). Run the
          # full suite locally with plain `pytest`.
          python -m pytest tests/ -q -m "not thread_race"

  frontend-build:
    name: frontend-build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node 20 (matches the image build stage)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies (lockfile-exact)
        run: npm ci

      # ESLint (incl. eslint-plugin-jsx-a11y) is not yet configured in
      # package.json. Once the lint tooling lands, enable:
      #   - name: Lint
      #     run: npm run lint

      - name: Build (vite)
        run: npm run build
