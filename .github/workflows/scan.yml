name: scan

on:
  pull_request:
    branches: [main]

permissions: {}

jobs:
  personal-data-scan:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Check out PR head (full history for base..head)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Personal-data scan (backstop)
        env:
          SCAN_PATTERNS_B64: ${{ secrets.SCAN_PATTERNS_B64 }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          if [ -z "${SCAN_PATTERNS_B64:-}" ]; then
            echo "::error::SCAN_PATTERNS_B64 is not set — cannot run the personal-data backstop." >&2
            exit 2
          fi
          PATTERN_DIR="$RUNNER_TEMP/scan-patterns"
          mkdir -p "$PATTERN_DIR" && chmod 700 "$PATTERN_DIR"
          trap 'rm -rf "$PATTERN_DIR"' EXIT
          printf '%s' "$SCAN_PATTERNS_B64" | base64 -d | tar -xz -C "$PATTERN_DIR"
          shopt -s nullglob
          pattern_files=("$PATTERN_DIR"/*.txt)
          shopt -u nullglob
          if [ "${#pattern_files[@]}" -eq 0 ]; then
            echo "::error::Decoded SCAN_PATTERNS_B64 contains no pattern files (*.txt)." >&2
            exit 2
          fi
          for pf in "${pattern_files[@]}"; do
            while IFS= read -r line || [ -n "$line" ]; do
              [ -n "$line" ] && echo "::add-mask::$line"
            done < "$pf"
          done
          printf '%s %s %s\n' "$BASE_SHA" "$HEAD_SHA" "refs/pull/$PR_NUMBER/merge" \
            | PATTERN_DIR="$PATTERN_DIR" ci/scanner.sh --ci --prereceive
